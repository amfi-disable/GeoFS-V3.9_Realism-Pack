name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic Syntax Check
        run: |
          # Ensuring key files exist
          test -f standalone.user.js
          test -f src/physics.js
